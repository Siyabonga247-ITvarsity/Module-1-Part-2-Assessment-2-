<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Movie Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Nu Metro</h1>
<h2 class="title">Featured Movies</h2>

<div class="slider-container">
    <button class="nav prev" onclick="slideLeft()">❮</button>

    <div class="slider" id="slider">
        <div class="movie-card">
            <a href="movies.html"><img src="images/shelter.jpg" alt="Description" width="345" height="295"></a>
            <h3>Shelter</h3>
            <h1><b>Showing Now</b></h1>
        </div>

        <div class="movie-card">
            <img src="images/rip.jpg" alt="Description" width="345" height="295">
            <h3>The Rip</h3>
        </div>

        <div class="movie-card">
            <img src="images/Goals.jpg" alt="Description" width="345" height="295" >
            <h3>Relationship Goals</h3>
        </div>

        <div class="movie-card">
            <img src="images/greenland_migration.jpg" alt="Description" width="345" height="295">
            <h3>Greenland</h3>
        </div>
    </div>

    <button class="nav next" onclick="slideRight()">❯</button>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
